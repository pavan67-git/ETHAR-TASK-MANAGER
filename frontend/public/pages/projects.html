<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — TaskFlow</title>
  <meta name="description" content="Manage your team projects in TaskFlow." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page">

  <!-- Sidebar (same structure, active state differs) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 11l3 3L22 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="/pages/dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="/pages/projects.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span>Projects</span></a>
      <a href="/pages/my-tasks.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>My Tasks</span></a>
      <a href="/pages/team.html" class="nav-item admin-only hidden"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>Team</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebar-avatar">--</div>
        <div class="user-info">
          <p class="user-name" id="sidebar-name">Loading...</p>
          <p class="user-role" id="sidebar-role">member</p>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="page-title">Projects</h1>
          <p class="page-subtitle">Manage your team workspaces</p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="project-search" placeholder="Search projects..." oninput="filterProjects(this.value)" />
        </div>
        <select class="filter-select" id="status-filter" onchange="filterProjects()">
          <option value="">All Status</option>
          <option value="planning">Planning</option>
          <option value="active">Active</option>
          <option value="on-hold">On Hold</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn-primary" onclick="openProjectModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Project
        </button>
      </div>
    </header>

    <div class="page-body">
      <div class="projects-grid" id="projects-grid">
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
        <div class="project-card skeleton"></div>
      </div>
      <div class="empty-state hidden" id="projects-empty">
        <div class="empty-icon">📁</div>
        <h3>No projects yet</h3>
        <p>Create your first project to get started</p>
        <button class="btn-primary" onclick="openProjectModal()">Create Project</button>
      </div>
    </div>
  </main>

  <!-- Create/Edit Project Modal -->
  <div class="modal-overlay hidden" id="project-modal-overlay" onclick="closeProjectModal(event)">
    <div class="modal" id="project-modal">
      <div class="modal-header">
        <h3 id="project-modal-title">Create New Project</h3>
        <button class="modal-close" onclick="closeProjectModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="project-form" onsubmit="handleProjectSubmit(event)" novalidate>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group flex-1">
              <label for="proj-name">Project Name *</label>
              <input type="text" id="proj-name" placeholder="e.g. Website Redesign" required maxlength="100" />
            </div>
            <div class="form-group color-picker-group">
              <label for="proj-color">Color</label>
              <input type="color" id="proj-color" value="#6366f1" />
            </div>
          </div>
          <div class="form-group">
            <label for="proj-desc">Description</label>
            <textarea id="proj-desc" placeholder="What is this project about?" rows="3" maxlength="500"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group flex-1">
              <label for="proj-status">Status</label>
              <select id="proj-status">
                <option value="planning">Planning</option>
                <option value="active">Active</option>
                <option value="on-hold">On Hold</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div class="form-group flex-1">
              <label for="proj-priority">Priority</label>
              <select id="proj-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="proj-due">Due Date</label>
            <input type="date" id="proj-due" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeProjectModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="project-submit-btn">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
