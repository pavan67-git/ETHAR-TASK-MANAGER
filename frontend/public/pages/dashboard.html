<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskFlow</title>
  <meta name="description" content="TaskFlow Dashboard: View your tasks, projects, and team progress at a glance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 11l3 3L22 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="/pages/dashboard.html" class="nav-item active" id="nav-dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/pages/projects.html" class="nav-item" id="nav-projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span>Projects</span>
      </a>
      <a href="/pages/my-tasks.html" class="nav-item" id="nav-tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>My Tasks</span>
      </a>
      <a href="/pages/team.html" class="nav-item admin-only hidden" id="nav-team">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Team</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card" id="user-card">
        <div class="user-avatar" id="sidebar-avatar">--</div>
        <div class="user-info">
          <p class="user-name" id="sidebar-name">Loading...</p>
          <p class="user-role" id="sidebar-role">member</p>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-subtitle" id="greeting-text">Good morning!</p>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="window.location.href='/pages/projects.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Project
        </button>
      </div>
    </header>

    <!-- Page Body -->
    <div class="page-body" id="dashboard-body">
      <!-- Stats Row -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
      </div>

      <!-- Middle Row -->
      <div class="dashboard-grid">
        <!-- Task Status Chart -->
        <div class="card" id="task-status-card">
          <div class="card-header">
            <h2 class="card-title">Task Status</h2>
          </div>
          <div class="card-body">
            <div class="donut-chart-container" id="task-donut"></div>
            <div class="status-legend" id="status-legend"></div>
          </div>
        </div>

        <!-- Recent Tasks -->
        <div class="card" id="recent-tasks-card">
          <div class="card-header">
            <h2 class="card-title">My Recent Tasks</h2>
            <a href="/pages/my-tasks.html" class="card-link">View all →</a>
          </div>
          <div class="card-body" id="recent-tasks-list">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>

      <!-- Bottom Row -->
      <div class="dashboard-grid">
        <!-- Upcoming Deadlines -->
        <div class="card" id="upcoming-card">
          <div class="card-header">
            <h2 class="card-title">Upcoming Deadlines</h2>
            <span class="badge badge-warning" id="overdue-badge"></span>
          </div>
          <div class="card-body" id="upcoming-tasks-list">
            <div class="loading-spinner"></div>
          </div>
        </div>

        <!-- Recent Projects -->
        <div class="card" id="projects-card">
          <div class="card-header">
            <h2 class="card-title">Active Projects</h2>
            <a href="/pages/projects.html" class="card-link">View all →</a>
          </div>
          <div class="card-body" id="recent-projects-list">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Notification -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
